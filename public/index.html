<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Dynamic QR Code Generator</h1>
    <p class="subtitle">Create QR codes with changeable destination links</p>

    <!-- Create form -->
    <div class="card create-card">
      <h2>Create New QR Code</h2>
      <form id="createForm">
        <div class="form-group">
          <label for="name">Label / Name</label>
          <input type="text" id="name" placeholder="e.g. My Website" required>
        </div>
        <div class="form-group">
          <label for="url">Destination URL</label>
          <input type="url" id="url" placeholder="https://example.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Generate QR Code</button>
      </form>
    </div>

    <!-- Result (shown after creation) -->
    <div id="result" class="card hidden">
      <h2>Your QR Code</h2>
      <div class="result-content">
        <img id="resultImg" src="" alt="QR Code">
        <div class="result-info">
          <p><strong id="resultName"></strong></p>
          <p class="url" id="resultDest"></p>
          <p class="redirect-url" id="resultRedirect"></p>
          <button class="btn btn-secondary btn-sm" id="downloadBtn">Download PNG</button>
        </div>
      </div>
    </div>

    <p class="rate-info">Limited to 10 QR codes per hour per IP address.</p>
  </div>

  <script>
    const createForm = document.getElementById('createForm');
    const result = document.getElementById('result');

    createForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const url = document.getElementById('url').value.trim();

      const res = await fetch('/api/qrcodes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, destination_url: url }),
      });

      if (res.status === 429) {
        alert('Rate limit reached. Please try again later.');
        return;
      }

      if (!res.ok) {
        const err = await res.json();
        alert(err.error || 'Something went wrong');
        return;
      }

      const data = await res.json();
      document.getElementById('resultImg').src = data.qr_data_url;
      document.getElementById('resultName').textContent = data.name;
      document.getElementById('resultDest').textContent = 'Destination: ' + data.destination_url;
      document.getElementById('resultRedirect').textContent = 'QR points to: ' + data.redirect_url;
      result.classList.remove('hidden');

      document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = `qr-${data.name}.png`;
        link.href = data.qr_data_url;
        link.click();
      };

      createForm.reset();
    });
  </script>
</body>
</html>
